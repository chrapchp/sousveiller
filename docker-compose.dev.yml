services:
  backend:
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
